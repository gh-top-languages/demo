<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GitHub Top Languages Demo</title>
  <meta name="description" content="Interactive demo for github-top-languages — configure and preview chart outputs"/>

  <link rel="stylesheet" type="text/css" href="./css/main.css">
  <script type="module" src="./main.ts"></script>
</head>

<body>
  <header>
    <h1>GitHub Top Languages Demo</h1>
    <p>Interactive demo for <a href="https://github.com/masonlet/github-top-languages-api" target="_blank" rel="noopener noreferrer">github-top-languages-api</a></p>
  </header>
  <main class="page">
    <section class="preview">
      <div id="chart-preview"></div>
    </section>
    <section class="controls">
      <label for="theme">Theme</label>
      <select id="theme" class="input">
        <option value="default">Default</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="none">None</option>
      </select>
      <div id="colour-pickers" hidden></div>
      <label for="type">Type</label>
      <select id="type" class="input">
        <option value="donut">Donut</option>
        <option value="pie">Pie</option>
      </select>
      <label for="count">Count</label>
      <input id="count" class="input" type="number" min="1" max="16" value="8"/>

      <label for="width">Width</label>
      <input id="width" class="input" type="number" min="400" value="400"/>

      <label for="height">Height</label>
      <input id="height" class="input" type="number" min="265" value="300"/>
    </section>
  </main>
</body>

</html>
