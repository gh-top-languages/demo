<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GitHub Top Languages Builder</title>
  <meta name="description" content="Interactive builder for github-top-languages — configure, preview, and export chart configurations"/>

  <link rel="stylesheet" type="text/css" href="./css/main.css">
  <script type="module" src="./main.ts"></script>
</head>

<body>
  <header>
    <h1>GitHub Top Languages Builder</h1>
    <p>Interactive builder for <a href="https://github.com/gh-top-languages/api" target="_blank" rel="noopener noreferrer">github-top-languages-api</a></p>
  </header>
  <main class="page">
    <section class="preview">
      <div id="chart-preview"></div>
    </section>
    <section class="settings">
      <h3 class="panel-heading">Controls</h3>

      <label for="theme">Theme</label>
      <select id="theme" class="input">
        <option value="default">Default</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="none">None</option>
      </select>
      <div id="colour-pickers" hidden></div>

      <label for="type">Type</label>
      <select id="type" class="input">
        <option value="donut">Donut</option>
        <option value="pie">Pie</option>
      </select>

      <label for="count">Count</label>
      <input id="count" class="input" type="number"/>

      <label for="width">Width</label>
      <input id="width" class="input" type="number"/>

      <label for="height">Height</label>
      <input id="height" class="input" type="number"/>

      <label for="stroke">Stroke</label>
      <input id="stroke" type="checkbox"/>

      <hr class="section-divider"/>

      <h3 class="panel-heading">Output</h3>

      <label>Host</label>
      <div class="url-input-row">
        <span class="url-affix">https://</span>
        <input id="api-host" class="input" type="text" placeholder="your-deployment.vercel.app"/>
      </div>

      <label>Endpoint</label>
      <input id="api-endpoint" class="input" type="text" value="/api/languages"/>

      <label>Embed URL</label>
      <div class="copy-row">
        <input id="embed-url" class="input" type="text" readonly/>
        <button class="btn" id="copy-url">Copy</button>
      </div>

      <label>Markdown</label>
      <div class="copy-row">
        <input id="embed-markdown" class="input" type="text" readonly/>
        <button class="btn" id="copy-markdown">Copy</button>
      </div>
    </section>
  </main>
</body>

</html>
